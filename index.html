<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתרגל ערבית - הרשימה המדויקת</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --text: #202124; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .question-text { font-size: 20px; font-weight: 700; margin: 25px 0; line-height: 1.5; min-height: 60px; }
        input { width: 90%; padding: 12px; border: 2px solid #dadce0; border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 5px; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; }
        .correct { background: #e6f4ea; color: #137333; }
        .wrong { background: #fce8e6; color: #c5221f; }
        .admin-section { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; text-align: right; }
        .word-list { max-height: 150px; overflow-y: auto; background: #f1f3f4; padding: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <div id="category" style="font-size:12px; color:gray">תרגול פעלים ומשפטים מחוברים</div>
    <div id="question" class="question-text">טוען שאלה...</div>
    <input type="text" id="answer" placeholder="התשובה בתעתיק..." autocomplete="off">
    <button id="action-btn" class="btn" onclick="checkAnswer()">בדוק תשובה</button>
    <div id="feedback" class="feedback"></div>
    <button id="next-btn" class="btn" style="display:none; background: var(--success);" onclick="generateQuestion()">לשאלה הבאה ⮕</button>

    <div class="admin-section">
        <details>
            <summary><b>ניהול מאגר הפעלים שלי ⚙️</b></summary>
            <div id="wordList" class="word-list"></div>
            <div style="margin-top:10px">
                <input type="text" id="newH" placeholder="עברית (למשל: סגר)">
                <input type="text" id="newS" placeholder="ערבית (למשל: סַכַּר)">
                <button class="btn" style="background:#5f6368" onclick="addWord()">הוסף פועל חדש</button>
            </div>
        </details>
    </div>
</div>

<script>
    const originalList = [
        { h: 'אכל', s: 'אכל' }, { h: 'פתח', s: 'פתח' }, { h: 'ישב', s: 'קעד' },
        { h: 'שאל', s: 'סאל' }, { h: 'נכנס', s: 'דח\'ל' }, { h: 'שחה', s: 'סבח' },
        { h: 'בישל', s: 'טבח\'' }, { h: 'עבר דירה/עבודה', s: 'נַקַל' }, { h: 'בא', s: 'אִגַ\'א' },
        { h: 'דיבר/סיפר', s: 'חַכַּא' }, { h: 'נתן', s: 'אִעְטַא' }, { h: 'קנה', s: 'אִשְתַרַא' },
        { h: 'יצא', s: 'טִלִע' }, { h: 'שתה', s: 'שִׁרִבּ' }, { h: 'לקח/קיבל', s: 'אַחַ\'ד' },
        { h: 'נהג', s: 'סאק' }, { h: 'ראה', s: 'שאף' }, { h: 'נישק', s: 'באס' },
        { h: 'ביקר', s: 'זאר' }, { h: 'היה', s: 'כאן' }, { h: 'הלך', s: 'ראח' }
    ];

    let myVerbs = JSON.parse(localStorage.getItem('myVerbs')) || originalList;
    let cur = {};

    function updateAdminList() {
        const list = document.getElementById('wordList');
        list.innerHTML = myVerbs.map((v, i) => `<div>${v.h} - ${v.s} <span style="color:red; cursor:pointer" onclick="removeWord(${i})">[X]</span></div>`).join('');
    }

    function addWord() {
        const h = document.getElementById('newH').value;
        const s = document.getElementById('newS').value;
        if(h && s) {
            myVerbs.push({h, s});
            localStorage.setItem('myVerbs', JSON.stringify(myVerbs));
            updateAdminList();
            document.getElementById('newH').value = ''; document.getElementById('newS').value = '';
        }
    }

    function removeWord(i) {
        myVerbs.splice(i, 1);
        localStorage.setItem('myVerbs', JSON.stringify(myVerbs));
        updateAdminList();
    }

    function generateQuestion() {
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('action-btn').style.display = 'block';
        document.getElementById('answer').value = '';

        const v1 = myVerbs[Math.floor(Math.random() * myVerbs.length)];
        const v2 = myVerbs[Math.floor(Math.random() * myVerbs.length)];
        const isJoint = Math.random() > 0.6 && v1 !== v2;

        function getPast(verb) {
            if (verb.s.endsWith("א") || verb.s.endsWith("י")) return verb.s.slice(0, -1) + "ית";
            return verb.s + "ת";
        }

        if (isJoint) {
            cur = {
                text: `איך אומרים: "אני ${v1.h}תי וגם ${v2.h}תי"?`,
                ans: getPast(v1) + " וּ" + getPast(v2)
            };
        } else {
            cur = { text: `איך אומרים: "הוא ${v1.h}"?`, ans: v1.s };
        }
        document.getElementById('question').innerText = cur.text;
    }

    function checkAnswer() {
        const u = document.getElementById('answer').value.trim().toLowerCase().replace(/'/g, "");
        const a = cur.ans.toLowerCase().replace(/'/g, "");
        const f = document.getElementById('feedback');
        if (u === a || u.includes(a)) {
            f.innerText = "נכון!"; f.className = "feedback correct";
        } else {
            f.innerHTML = `התשובה: <b>${cur.ans}</b>`; f.className = "feedback wrong";
        }
        f.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('action-btn').style.display = 'none';
    }

    updateAdminList();
    generateQuestion();
</script>
</body>
</html>
